<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NEXA AI Auth</title>

<link rel="stylesheet"
href="css/auth.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="background-glow"></div>

<div class="container">

  <!-- SIGN UP -->

  <div class="form-container sign-up">

    <form id="registerForm">

      <h1>Create Account</h1>

      <span>
        Join NEXA AI today
      </span>

      <input
      type="email"
      id="registerEmail"
      placeholder="Email"
      required>

      <input
      type="password"
      id="registerPassword"
      placeholder="Password"
      required>

      <button type="submit">
        Register
      </button>

    </form>

  </div>

  <!-- LOGIN -->

  <div class="form-container sign-in">

    <form id="loginForm">

      <h1>Login</h1>

      <span>
        Welcome back
      </span>

      <input
      type="email"
      id="loginEmail"
      placeholder="Email"
      required>

      <input
      type="password"
      id="loginPassword"
      placeholder="Password"
      required>

      <button type="submit">
        Login
      </button>

    </form>

  </div>

  <!-- TOGGLE -->

  <div class="toggle-container">

    <div class="toggle">

      <div class="toggle-panel toggle-left">

        <h1>Welcome Back!</h1>

        <p>
          Already have an account?
        </p>

        <button
        class="hidden"
        id="login">
          Login
        </button>

      </div>

      <div class="toggle-panel toggle-right">

        <h1>Hello Friend!</h1>

        <p>
          Create your NEXA AI account
        </p>

        <button
        class="hidden"
        id="register">
          Register
        </button>

      </div>

    </div>

  </div>

</div>

<script type="module"
src="js/auth.js"></script>

</body>
</html>
